<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universe System - The Second Time</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- NỀN VÀ GIAO DIỆN CHÍNH --- */
        * { box-sizing: border-box; outline: none; -webkit-font-smoothing: antialiased; }
        body { 
            margin: 0; padding: 0; background: #0b0e14 url('./cover.jpg') no-repeat center fixed; 
            background-size: cover; display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: 'Be Vietnam Pro', sans-serif; color: white; 
        }

        /* --- SAO BĂNG --- */
        .meteors { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .meteor { position: absolute; top: -10px; width: 2px; height: 60px; background: linear-gradient(to bottom, transparent, #fff); transform: rotate(-45deg); animation: shoot 5s linear infinite; }
        @keyframes shoot { 0% { top: -10%; transform: translateX(0) rotate(-45deg); opacity: 1; } 100% { top: 110%; transform: translateX(-600px) rotate(-45deg); opacity: 0; } }

        /* --- TRÌNH PHÁT NHẠC (GÓC TRÁI) --- */
        .music-player {
            position: fixed; bottom: 30px; left: 30px; z-index: 1000;
            display: none; flex-direction: column; gap: 8px;
            background: rgba(15, 23, 42, 0.9); padding: 15px 20px;
            border-radius: 16px; border-left: 5px solid #38bdf8;
            backdrop-filter: blur(10px); box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }
        .music-title { font-size: 10px; color: #38bdf8; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; animation: pulse 2s infinite; }
        #vol-slider { cursor: pointer; accent-color: #38bdf8; width: 100px; height: 4px; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        /* --- CONTAINER ĐÃ FIX LỆCH --- */
        .main-box { 
            position: relative; width: 440px; min-height: 580px; 
            background: rgba(10, 15, 25, 0.85); backdrop-filter: blur(25px); 
            border: 1px solid rgba(56, 189, 248, 0.3); border-radius: 32px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; box-shadow: 0 0 100px rgba(0,0,0,1); z-index: 10; 
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        /* --- LOADING BAR TO & GLOW --- */
        #loading-ui { width: 100%; text-align: center; }
        .bar-bg { width: 100%; height: 16px; background: rgba(0,0,0,0.5); border-radius: 20px; border: 1px solid #1e293b; overflow: hidden; margin-bottom: 20px; }
        #bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #0ea5e9, #38bdf8); box-shadow: 0 0 15px #38bdf8; transition: 0.1s; }
        .load-txt { color: #38bdf8; font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; }

        /* --- FORM STYLING --- */
        .auth-form { display: none; width: 100%; flex-direction: column; opacity: 0; transition: 0.5s; }
        .active { display: flex; opacity: 1; }

        .field { margin-bottom: 22px; width: 100%; text-align: left; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .label-row label { color: #94a3b8; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }

        .input-box { position: relative; width: 100%; }
        .input-box input { 
            width: 100%; padding: 16px 20px; background: rgba(0, 0, 0, 0.6); 
            border: 1px solid #334155; border-radius: 14px; color: #fff; 
            font-size: 15px; transition: 0.3s; padding-right: 50px;
        }

        /* ĐỘ MẠNH PASS (MÀU SẮC) */
        input.weak { border-color: #ef4444 !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
        input.medium { border-color: #f59e0b !important; box-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }
        input.strong { border-color: #10b981 !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }

        .eye-btn { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #64748b; font-size: 22px; z-index: 5; transition: 0.2s; }
        .eye-btn:hover { color: #38bdf8; }
        
        .gen-btn { color: #38bdf8; cursor: pointer; font-size: 9px; border: 1px solid #38bdf8; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; transition: 0.3s; }
        .gen-btn:hover { background: #38bdf8; color: #000; box-shadow: 0 0 10px #38bdf8; }

        /* --- NÚT BẤM HIỆU ỨNG QUÉT SÁNG --- */
        .btn-main { 
            position: relative; width: 100%; padding: 18px; 
            background: #000; color: #fff; border: 1px solid #38bdf8; 
            border-radius: 14px; font-weight: 700; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 3px; overflow: hidden;
            transition: 0.4s; margin-top: 10px;
        }
        .btn-main::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.4s;
        }
        .btn-main:hover::before { left: 100%; }
        .btn-main:hover { box-shadow: 0 0 30px rgba(56, 189, 248, 0.5); border-color: #fff; transform: translateY(-2px); }

        /* --- VIDEO & GAME UI --- */
        #intro-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; opacity: 0; transition: 1s; }
        #intro-vid { width: 100%; height: 100%; object-fit: cover; }
        
        #game-ui {
            display: none; width: 85%; max-width: 1000px; height: 75vh;
            background: rgba(15, 23, 42, 0.9); border: 1px solid #38bdf8; 
            border-radius: 24px; padding: 40px; flex-direction: column; opacity: 0; transition: 1s;
        }

        /* --- TOAST --- */
        #toast-box { position: fixed; top: 20px; right: 20px; z-index: 10001; }
        .toast { background: rgba(15, 23, 42, 0.95); color: #fff; padding: 15px 25px; border-radius: 12px; border-left: 5px solid #38bdf8; margin-bottom: 10px; transform: translateX(150%); transition: 0.5s; box-shadow: 0 10px 20px rgba(0,0,0,0.5); font-size: 13px; }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <div id="toast-box"></div>

    <div class="meteors">
        <div class="meteor" style="left: 10%; animation-delay: 1s;"></div>
        <div class="meteor" style="left: 80%; animation-delay: 3s;"></div>
    </div>

    <div class="music-player" id="player">
        <div class="music-title">🎵 BGM: SENBONZAKURA</div>
        <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="0.5">
    </div>

    <div class="main-box" id="container">
        <img src="./logo.png" style="max-width: 230px; margin-bottom: 30px;">
        
        <div id="loading-ui">
            <div class="bar-bg"><div id="bar-fill"></div></div>
            <div class="load-txt">SYSTEM BOOTING... <span id="percent">0%</span></div>
        </div>

        <button id="start-btn" class="btn-main" style="display: none; border-radius: 50px;">KHỞI ĐỘNG HỆ THỐNG</button>

        <div id="reg-form" class="auth-form">
            <h2 style="text-align:center; margin-bottom:25px; letter-spacing:5px;">ĐĂNG KÝ</h2>
            <div class="field">
                <div class="label-row"><label>Tên nhân vật</label></div>
                <div class="input-box"><input type="text" id="r-user" placeholder="Nhập username..."></div>
            </div>
            <div class="field">
                <div class="label-row"><label>Mật khẩu</label><span class="gen-btn" onclick="genPass()">Tạo tự động</span></div>
                <div class="input-box">
                    <input type="password" id="r-pass" placeholder="Nhập password...">
                    <span class="eye-btn" onclick="toggle('r-pass')">👁</span>
                </div>
            </div>
            <div class="field">
                <div class="label-row"><label>Xác nhận</label></div>
                <div class="input-box">
                    <input type="password" id="r-re" placeholder="Nhập lại...">
                    <span class="eye-btn" onclick="toggle('r-re')">👁</span>
                </div>
            </div>
            <button class="btn-main" onclick="doRegister()">Khởi Tạo Ký Ức</button>
            <p style="text-align:center; font-size:12px; margin-top:20px;">Đã có tài khoản? <b style="color:#38bdf8; cursor:pointer;" onclick="go('login')">Đăng nhập</b></p>
        </div>

        <div id="log-form" class="auth-form">
            <h2 style="text-align:center; margin-bottom:25px; letter-spacing:5px;">ĐĂNG NHẬP</h2>
            <div class="field">
                <div class="label-row"><label>Tên tài khoản</label></div>
                <div class="input-box"><input type="text" id="l-user"></div>
            </div>
            <div class="field">
                <div class="label-row"><label>Mật mã</label></div>
                <div class="input-box">
                    <input type="password" id="l-pass">
                    <span class="eye-btn" onclick="toggle('l-pass')">👁</span>
                </div>
            </div>
            <button class="btn-main" onclick="doLogin()">Vào Universe</button>
            <p style="text-align:center; font-size:12px; margin-top:20px;">Người mới? <b style="color:#38bdf8; cursor:pointer;" onclick="go('reg')">Đăng ký ngay</b></p>
        </div>
    </div>

    <div id="intro-overlay">
        <video id="intro-vid" playsinline><source src="./intro.mp4" type="video/mp4"></video>
        <div style="position:absolute; bottom:30px; right:30px; border:1px solid #fff; padding:10px 20px; cursor:pointer; font-size:12px;" onclick="endIntro()">BỎ QUA INTRO [ESC]</div>
    </div>

    <div id="game-ui">
        <div style="display:flex; justify-content:space-between; border-bottom:1px solid #38bdf8; padding-bottom:15px;">
            <div><h2 id="p-name" style="margin:0; color:#38bdf8;">PLAYER</h2><span id="p-uid" style="font-size:10px; color:#64748b;">UID: ---</span></div>
            <div style="color:#10b981; font-weight:bold;">● ONLINE</div>
        </div>
        <div style="flex:1; display:flex; justify-content:center; align-items:center;"><h3>CHÀO MỪNG ĐÃ TRỞ LẠI VŨ TRỤ</h3></div>
    </div>

    <audio id="bgm" loop src="./bgm.mp3"></audio>

    <script>
        // --- DATA & SETUP ---
        let db = JSON.parse(localStorage.getItem('UNIVERSE_DB')) || [];
        let session = null;
        const bgm = document.getElementById('bgm');

        // --- 1. LOADING ---
        let p = 0;
        const load = setInterval(() => {
            p += Math.floor(Math.random() * 5) + 2;
            if(p >= 100) {
                p = 100; clearInterval(load);
                document.getElementById('loading-ui').style.display = 'none';
                document.getElementById('start-btn').style.display = 'block';
            }
            document.getElementById('bar-fill').style.width = p + '%';
            document.getElementById('percent').innerText = p + '%';
        }, 70);

        // --- 2. START ---
        document.getElementById('start-btn').onclick = () => {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('player').style.display = 'flex';
            bgm.volume = 0.5; bgm.play().catch(() => toast("Nhấn phím bất kỳ để nghe nhạc"));
            go('reg');
        };

        // --- 3. ĐỘ MẠNH PASS ---
        document.getElementById('r-pass').oninput = function(e) {
            let v = e.target.value; this.className = '';
            if(v.length >= 8 && /[A-Z]/.test(v)) this.classList.add('strong');
            else if(v.length >= 5) this.classList.add('medium');
            else if(v.length > 0) this.classList.add('weak');
        };

        // --- 4. LOGIC CHÍNH ---
        function go(type) {
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            const target = document.getElementById(type + '-form');
            target.style.display = 'flex';
            setTimeout(() => target.classList.add('active'), 50);
        }

        function doRegister() {
            let u = document.getElementById('r-user').value.trim();
            let p = document.getElementById('r-pass').value;
            if(!u || !p) return toast("⚠️ Thiếu thông tin!");
            if(p !== document.getElementById('r-re').value) return toast("❌ Pass không khớp!");
            
            let id = "UID-" + Math.random().toString().slice(2, 12);
            db.push({u, p, id});
            localStorage.setItem('UNIVERSE_DB', JSON.stringify(db));
            toast("✅ Đăng ký thành công!");
            setTimeout(() => go('log'), 1200);
        }

        function doLogin() {
            let u = document.getElementById('l-user').value.trim();
            let p = document.getElementById('l-pass').value;
            let user = db.find(x => x.u === u && x.p === p);
            
            if(user) {
                session = user;
                toast("🚀 Đang khởi động...");
                document.getElementById('container').style.opacity = '0';
                setTimeout(startIntro, 800);
            } else {
                toast("❌ Sai tài khoản!");
                document.getElementById('container').classList.add('shake');
                setTimeout(() => document.getElementById('container').classList.remove('shake'), 400);
            }
        }

        function startIntro() {
            bgm.pause();
            const ov = document.getElementById('intro-overlay');
            const v = document.getElementById('intro-vid');
            ov.style.display = 'block';
            setTimeout(() => ov.style.opacity = '1', 50);
            v.play();
            v.onended = endIntro;
        }

        function endIntro() {
            document.getElementById('intro-overlay').remove();
            bgm.play();
            document.getElementById('container').style.display = 'none';
            const gui = document.getElementById('game-ui');
            gui.style.display = 'flex';
            document.getElementById('p-name').innerText = session.u.toUpperCase();
            document.getElementById('p-uid').innerText = "ID: " + session.id;
            setTimeout(() => gui.style.opacity = '1', 100);
        }

        // --- UTILS ---
        function toggle(id) { let x = document.getElementById(id); x.type = x.type === 'password' ? 'text' : 'password'; }
        function genPass() {
            let p = "S" + Math.random().toString(36).slice(-8).toUpperCase() + "!";
            document.getElementById('r-pass').value = p; 
            document.getElementById('r-re').value = p;
            document.getElementById('r-pass').dispatchEvent(new Event('input'));
        }
        function toast(m) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = m;
            document.getElementById('toast-box').appendChild(t);
            setTimeout(() => t.classList.add('show'), 50);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 500); }, 3000);
        }
        document.getElementById('vol-slider').oninput = (e) => bgm.volume = e.target.value;
    </script>
</body>
</html>
