<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Second Time - Universe System</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- RESET & NỀN --- */
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            margin: 0; padding: 0; background: #0b0e14 url('./cover.jpg') no-repeat center fixed; 
            background-size: cover; display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: 'Be Vietnam Pro', sans-serif; color: white; 
        }

        /* --- SAO BĂNG --- */
        .meteors { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .meteor { position: absolute; top: -10px; width: 2px; height: 60px; background: linear-gradient(to bottom, rgba(255,255,255,0), #fff); transform: rotate(-45deg); animation: shoot 5s linear infinite; }
        @keyframes shoot { 0% { top: -10%; transform: translateX(0) rotate(-45deg); opacity: 1; } 100% { top: 110%; transform: translateX(-600px) rotate(-45deg); opacity: 0; } }

        /* --- CONTAINER CHÍNH --- */
        .container { 
            position: relative; width: 440px; min-height: 580px; 
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(25px); 
            border: 2px solid rgba(56, 189, 248, 0.4); border-radius: 28px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 45px; box-shadow: 0 0 80px rgba(0,0,0,0.8); z-index: 10; 
            transition: all 0.5s ease;
        }

        /* --- LOADING TO & ĐẸP --- */
        #loading-area { width: 100%; text-align: center; }
        .loading-bar-container { 
            width: 100%; height: 14px; /* Làm to hơn */
            background: rgba(0,0,0,0.5); border-radius: 20px; 
            overflow: hidden; border: 1px solid #334155; margin-bottom: 15px;
        }
        #bar-fill { 
            width: 0%; height: 100%; background: linear-gradient(90deg, #38bdf8, #818cf8); 
            box-shadow: 0 0 15px #38bdf8; transition: 0.2s; 
        }
        .loading-text { color: #38bdf8; font-size: 11px; letter-spacing: 3px; font-weight: 700; text-transform: uppercase; }

        /* --- FORM LAYOUT --- */
        .auth-form { display: none; width: 100%; flex-direction: column; opacity: 0; transition: 0.5s; }
        .auth-form.active { display: flex; opacity: 1; }

        .input-group { margin-bottom: 22px; width: 100%; }
        .input-label-row { 
            display: flex; justify-content: space-between; align-items: flex-end; 
            margin-bottom: 10px; 
        }
        .input-label-row label { color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; }

        .input-wrapper { position: relative; width: 100%; }
        .input-wrapper input { 
            width: 100%; padding: 15px 18px; background: rgba(0, 0, 0, 0.6); 
            border: 1px solid #334155; border-radius: 12px; color: #fff; 
            outline: none; transition: 0.3s; font-size: 15px; padding-right: 50px;
        }
        .input-wrapper input:focus { border-color: #38bdf8; background: rgba(0, 0, 0, 0.8); }

        /* Icon to và rõ hơn */
        .eye-icon { 
            position: absolute; right: 18px; top: 50%; transform: translateY(-50%); 
            cursor: pointer; color: #64748b; font-size: 20px; transition: 0.3s; 
        }
        .eye-icon:hover { color: #38bdf8; }

        .gen-btn { 
            color: #38bdf8; cursor: pointer; font-weight: bold; font-size: 10px; 
            border: 1px solid #38bdf8; padding: 4px 8px; border-radius: 6px; 
            text-transform: uppercase; transition: 0.3s;
        }
        .gen-btn:hover { background: rgba(56, 189, 248, 0.1); }

        .confirm-btn { 
            width: 100%; padding: 18px; background: linear-gradient(135deg, #0f172a, #000); 
            color: #fff; border: 1px solid #38bdf8; border-radius: 14px; font-weight: 700; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.4s; margin-top: 10px;
        }
        .confirm-btn:hover { box-shadow: 0 0 25px rgba(56, 189, 248, 0.4); border-color: #fff; }

        /* --- VIDEO OVERLAY --- */
        #video-intro-container {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 10000; justify-content: center; align-items: center; opacity: 0; transition: 1s;
        }
        #intro-video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="meteors">
        <div class="meteor" style="left: 15%; animation-delay: 1s;"></div>
        <div class="meteor" style="left: 80%; animation-delay: 2.5s;"></div>
    </div>

    <div class="container" id="main-container">
        <img src="./logo.png" style="max-width: 220px; margin-bottom: 30px;" alt="Logo">
        
        <div id="loading-area">
            <div class="loading-bar-container">
                <div id="bar-fill"></div>
            </div>
            <div class="loading-text">Initializing System... <span id="percent">0%</span></div>
        </div>

        <button id="start-btn" style="display: none; background: transparent; color: #fff; border: 2px solid #38bdf8; padding: 15px 50px; font-size: 16px; font-weight: 700; cursor: pointer; border-radius: 50px; letter-spacing: 2px;">BẮT ĐẦU TRẢI NGHIỆM</button>

        <div id="register-form" class="auth-form">
            <h3 style="text-align:center; margin-bottom:25px; letter-spacing:4px; color:#38bdf8;">ĐĂNG KÝ</h3>
            
            <div class="input-group">
                <div class="input-label-row"><label>Tên nhân vật</label></div>
                <div class="input-wrapper"><input type="text" id="reg-user" placeholder="Tên truy cập..."></div>
            </div>

            <div class="input-group">
                <div class="input-label-row">
                    <label>Mật khẩu</label>
                    <span class="gen-btn" onclick="autoGen()">Tạo tự động</span>
                </div>
                <div class="input-wrapper">
                    <input type="password" id="reg-pass" placeholder="Mật khẩu...">
                    <span class="eye-icon" onclick="togglePass('reg-pass')">👁</span>
                </div>
            </div>

            <div class="input-group">
                <div class="input-label-row"><label>Xác nhận ký ức</label></div>
                <div class="input-wrapper">
                    <input type="password" id="reg-repass" placeholder="Nhập lại mật khẩu...">
                    <span class="eye-icon" onclick="togglePass('reg-repass')">👁</span>
                </div>
            </div>

            <button class="confirm-btn" onclick="handleRegister()">Khởi Tạo Ký Ức</button>
            <p style="text-align:center; font-size:13px; margin-top:20px; color:#94a3b8;">Đã có tài khoản? <b style="color:#38bdf8; cursor:pointer;" onclick="showForm('login')">Đăng nhập</b></p>
        </div>

        <div id="login-form" class="auth-form">
            <h3 style="text-align:center; margin-bottom:25px; letter-spacing:4px; color:#38bdf8;">ĐĂNG NHẬP</h3>
            <div class="input-group">
                <div class="input-label-row"><label>Tài khoản</label></div>
                <div class="input-wrapper"><input type="text" id="login-user" placeholder="Nhập tên tài khoản..."></div>
            </div>
            <div class="input-group">
                <div class="input-label-row"><label>Mật mã</label></div>
                <div class="input-wrapper">
                    <input type="password" id="login-pass" placeholder="Nhập mật khẩu...">
                    <span class="eye-icon" onclick="togglePass('login-pass')">👁</span>
                </div>
            </div>
            <button class="confirm-btn" onclick="handleLogin()">Vào Universe</button>
            <p style="text-align:center; font-size:13px; margin-top:20px; color:#94a3b8;">Chưa có tài khoản? <b style="color:#38bdf8; cursor:pointer;" onclick="showForm('register')">Đăng ký</b></p>
        </div>
    </div>

    <div id="video-intro-container">
        <video id="intro-video" playsinline>
            <source src="./intro.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        // --- 1. LOADING LOGIC ---
        let prg = 0;
        const barFill = document.getElementById('bar-fill');
        const percentTxt = document.getElementById('percent');
        const loadingArea = document.getElementById('loading-area');
        const startBtn = document.getElementById('start-btn');

        const loadingInterval = setInterval(() => {
            prg += Math.floor(Math.random() * 4) + 1;
            if (prg >= 100) {
                prg = 100;
                clearInterval(loadingInterval);
                setTimeout(() => {
                    loadingArea.style.display = 'none';
                    startBtn.style.display = 'block';
                }, 500);
            }
            barFill.style.width = prg + '%';
            percentTxt.innerText = prg + '%';
        }, 50);

        // --- 2. SWITCH FORMS ---
        startBtn.onclick = () => {
            startBtn.style.display = 'none';
            showForm('register');
        };

        function showForm(type) {
            const forms = document.querySelectorAll('.auth-form');
            forms.forEach(f => { f.style.display = 'none'; f.classList.remove('active'); });
            
            const target = document.getElementById(type + '-form');
            target.style.display = 'flex';
            setTimeout(() => target.classList.add('active'), 50);
        }

        // --- 3. VIDEO INTRO ---
        function handleLogin() {
            const container = document.getElementById('main-container');
            const videoBox = document.getElementById('video-intro-container');
            const video = document.getElementById('intro-video');

            container.style.opacity = '0';
            setTimeout(() => {
                container.style.display = 'none';
                videoBox.style.display = 'flex';
                setTimeout(() => videoBox.style.opacity = '1', 50);
                video.play();
            }, 600);
        }

        // --- UTILS ---
        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function autoGen() {
            const p = "S" + Math.random().toString(36).slice(-8).toUpperCase() + "!";
            document.getElementById('reg-pass').value = p;
            document.getElementById('reg-repass').value = p;
        }

        function handleRegister() {
            alert("Đăng ký thành công! Hãy chuyển sang Đăng nhập.");
            showForm('login');
        }
    </script>
</body>
</html>
