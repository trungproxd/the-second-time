<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Second Time - Universe System</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { margin: 0; padding: 0; background: #0b0e14 url('./cover.jpg') no-repeat center fixed; background-size: cover; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Be Vietnam Pro', sans-serif; color: white; }
        
        /* HIỆU ỨNG SAO BĂNG */
        .meteors { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .meteor { position: absolute; top: -10px; width: 2px; height: 50px; background: linear-gradient(to bottom, rgba(255,255,255,0), #fff); transform: rotate(-45deg); animation: shoot 5s linear infinite; }
        @keyframes shoot { 0% { top: -10%; transform: translateX(0) rotate(-45deg); opacity: 1; } 100% { top: 110%; transform: translateX(-600px) rotate(-45deg); opacity: 0; } }

        /* KHUNG CHÍNH (GIỮA MÀN HÌNH) */
        .container { 
            position: relative; width: 850px; height: 550px; 
            background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(15px); 
            border: 2px solid rgba(56, 189, 248, 0.3); border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 40px; box-shadow: 0 0 50px rgba(0,0,0,0.9); z-index: 10; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .logo-box img { max-width: 280px; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.6)); }

        /* ĐƯA NHẠC XUỐNG GÓC TRÁI DƯỚI */
        .music-player-fixed {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            display: none; /* Chỉ hiện sau khi nhấn Start */
            flex-direction: column;
            gap: 8px;
            background: rgba(0, 0, 0, 0.5);
            padding: 12px 20px;
            border-radius: 10px;
            border-left: 3px solid #38bdf8;
            backdrop-filter: blur(5px);
        }

        #music-info { 
            font-size: 11px; 
            color: #38bdf8; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        #volume-box { display: flex; align-items: center; gap: 10px; }
        #volume-box input { cursor: pointer; accent-color: #38bdf8; width: 80px; height: 4px; }

        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        /* NÚT START & LOADING (GIỮ NGUYÊN) */
        #start-btn { display: none; background: #000; color: #fff; border: 2px solid #38bdf8; padding: 18px 70px; font-size: 20px; font-weight: 700; cursor: pointer; border-radius: 50px; transition: 0.3s; }
        #start-btn:hover { background: #38bdf8; color: #000; box-shadow: 0 0 30px #38bdf8; }
        
        .loading-area { width: 60%; text-align: center; }
        .bar-bg { width: 100%; height: 10px; background: rgba(0,0,0,0.5); border-radius: 20px; border: 1px solid #475569; overflow: hidden; }
        #bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #38bdf8, #818cf8); }

        /* FORM GIAO DIỆN */
        .auth-form { display: none; width: 100%; max-width: 380px; flex-direction: column; opacity: 0; }
        .input-group { margin-bottom: 15px; text-align: left; position: relative; }
        .input-group label { display: flex; justify-content: space-between; color: #94a3b8; font-size: 11px; margin-bottom: 6px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.7); border: 1px solid #334155; border-radius: 8px; color: #fff; outline: none; }
        .confirm-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #0f172a, #000); color: #fff; border: 1px solid #38bdf8; border-radius: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .toast { background: rgba(15, 23, 42, 0.95); color: #fff; padding: 15px 25px; border-radius: 10px; border-left: 4px solid #38bdf8; margin-bottom: 10px; transform: translateX(130%); transition: 0.5s; font-size: 12px; }
        .toast.show { transform: translateX(0); }
        .switch-text { margin-top: 20px; text-align: center; color: #94a3b8; font-size: 12px; }
        .switch-text b { color: #38bdf8; cursor: pointer; }
        .credit { position: absolute; bottom: 15px; right: 20px; color: rgba(255, 255, 255, 0.1); font-size: 10px; }
    </style>
</head>
<body>

    <div id="toast-container"></div>
    <div class="meteors"><div class="meteor" style="left: 70%"></div><div class="meteor" style="left: 20%; animation-delay: 2.5s;"></div></div>

    <div class="music-player-fixed" id="player-ui">
        <div id="music-info">🎵 Now Playing: Senbonzakura</div>
        <div id="volume-box">
            <span style="font-size: 8px; color: #94a3b8;">VOL</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5">
        </div>
    </div>

    <div class="container" id="main-container">
        <div class="logo-box"><img src="./logo.png" alt="Logo"></div>

        <div class="loading-area" id="loading-area">
            <div class="bar-bg"><div id="bar-fill"></div></div>
            <p style="color: #38bdf8; font-size: 10px; margin-top: 10px; letter-spacing: 2px;">SYNCHRONIZING...</p>
        </div>

        <button id="start-btn">NHẤP ĐỂ BẮT ĐẦU</button>

        <div id="register-form" class="auth-form">
            <h3 style="text-align:center; margin-bottom:20px; letter-spacing:3px;">ĐĂNG KÝ</h3>
            <div class="input-group">
                <label>Tên nhân vật</label>
                <input type="text" id="reg-user" placeholder="Nhập tên...">
            </div>
            <div class="input-group">
                <label>Mật khẩu <span onclick="autoGenPass()" style="color:#38bdf8; cursor:pointer; font-size:9px;">[TẠO TỰ ĐỘNG]</span></label>
                <input type="password" id="reg-pass">
            </div>
            <button class="confirm-btn" onclick="handleRegister()">Xác nhận</button>
            <div class="switch-text">Đã có tài khoản? <b onclick="showForm('login')">Đăng nhập</b></div>
        </div>

        <div id="login-form" class="auth-form">
            <h3 style="text-align:center; margin-bottom:20px; letter-spacing:3px;">ĐĂNG NHẬP</h3>
            <div class="input-group"><label>Tài khoản</label><input type="text" id="login-user"></div>
            <div class="input-group"><label>Mật khẩu</label><input type="password" id="login-pass"></div>
            <button class="confirm-btn" onclick="showToast('Đang kết nối...')">Vào Game</button>
            <div class="switch-text">Người mới? <b onclick="showForm('register')">Đăng ký</b></div>
        </div>
    </div>

    <div class="credit">THE SECOND TIME | KBG</div>

    <audio id="bgm" loop src="./bgm.mp3"></audio>

    <script>
        const startBtn = document.getElementById('start-btn');
        const loadingArea = document.getElementById('loading-area');
        const playerUI = document.getElementById('player-ui');
        const bgm = document.getElementById('bgm');
        const volSlider = document.getElementById('volume-slider');
        const container = document.getElementById('main-container');

        // Loading Logic
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 5) + 2;
            if (progress >= 100) {
                progress = 100; clearInterval(interval);
                loadingArea.style.display = 'none'; startBtn.style.display = 'block';
            }
            document.getElementById('bar-fill').style.width = progress + '%';
        }, 80);

        // Click Start
        startBtn.onclick = () => {
            startBtn.style.display = 'none';
            playerUI.style.display = 'flex'; // HIỆN PLAYER Ở GÓC TRÁI
            bgm.volume = 0.5;
            bgm.play();

            container.style.width = '400px';
            container.style.height = 'auto';
            document.getElementById('register-form').style.display = 'flex';
            setTimeout(() => { document.getElementById('register-form').style.opacity = '1'; }, 50);
        };

        volSlider.oninput = (e) => { bgm.volume = e.target.value; };

        function showForm(type) {
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'none';
            const target = type === 'login' ? 'login-form' : 'register-form';
            document.getElementById(target).style.display = 'flex';
            setTimeout(() => { document.getElementById(target).style.opacity = '1'; }, 50);
        }

        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.classList.add('show'), 100);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 500); }, 3000);
        }

        function handleRegister() {
            showToast("✨ Đăng ký thành công!");
            setTimeout(() => showForm('login'), 2000);
        }
    </script>
</body>
</html>
