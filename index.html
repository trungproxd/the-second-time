<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Second Time - Universe Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS GỐC & HIỆU ỨNG (Giữ nguyên phong cách của bạn) */
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { margin: 0; padding: 0; background: #0b0e14 url('cover.jpg') no-repeat center fixed; background-size: cover; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Be Vietnam Pro', sans-serif; color: white; }
        
        .meteors { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .meteor { position: absolute; top: -10px; width: 2px; height: 50px; background: linear-gradient(to bottom, rgba(255,255,255,0), #fff); transform: rotate(-45deg); animation: shoot 5s linear infinite; }
        @keyframes shoot { 0% { top: -10%; transform: translateX(0) rotate(-45deg); opacity: 1; } 100% { top: 110%; transform: translateX(-600px) rotate(-45deg); opacity: 0; } }

        .container { position: relative; width: 850px; height: 520px; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 3px solid #64748b; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.9); z-index: 10; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .logo-box img { max-width: 320px; margin-bottom: 25px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.4)); }

        /* LOADING AREA */
        .loading-area { width: 60%; text-align: center; }
        .bar-bg { width: 100%; height: 10px; background: rgba(0,0,0,0.5); border-radius: 20px; border: 1px solid #475569; overflow: hidden; }
        #bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #38bdf8, #818cf8); box-shadow: 0 0 10px #38bdf8; }
        
        /* NÚT START */
        #start-btn { display: none; position: relative; background: #000; color: #fff; border: 2px solid #38bdf8; padding: 18px 70px; font-size: 22px; font-weight: 700; cursor: pointer; overflow: hidden; letter-spacing: 3px; border-radius: 50px; }
        #start-btn::after { content: ""; position: absolute; top: -50%; left: -150%; width: 60px; height: 200%; background: rgba(255, 255, 255, 0.2); transform: rotate(30deg); animation: shine 3s infinite; }
        @keyframes shine { 0% { left: -150%; } 20% { left: 150%; } 100% { left: 150%; } }

        /* AUTH FORMS */
        .auth-form { display: none; width: 100%; max-width: 360px; flex-direction: column; opacity: 0; }
        .input-group { margin-bottom: 15px; text-align: left; position: relative; }
        .input-group label { display: block; color: #94a3b8; font-size: 10px; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.6); border: 1px solid #334155; border-radius: 8px; color: #fff; outline: none; transition: 0.3s; }
        
        /* Password Glow */
        input.weak { border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
        input.medium { border-color: #f59e0b; box-shadow: 0 0 10px rgba(245, 158, 11, 0.4); }
        input.strong { border-color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); }

        .eye-icon { position: absolute; right: 12px; top: 28px; cursor: pointer; color: #64748b; }

        /* NÚT XÁC NHẬN FIX ĐẸP */
        .confirm-btn { position: relative; width: 100%; padding: 14px; background: linear-gradient(135deg, #0f172a, #000); color: #fff; border: 1px solid #38bdf8; border-radius: 8px; font-weight: 700; cursor: pointer; overflow: hidden; text-transform: uppercase; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2); transition: 0.3s; margin-top: 10px; }
        .confirm-btn:hover { border-color: #fff; box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); transform: translateY(-2px); }

        .switch-text { margin-top: 20px; text-align: center; color: #94a3b8; font-size: 12px; }
        .switch-text b { color: #38bdf8; cursor: pointer; text-decoration: underline; }

        /* TOAST NOTIFICATION */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .toast { background: rgba(16, 185, 129, 0.9); color: white; padding: 15px 25px; border-radius: 8px; border-left: 5px solid #059669; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 10px; transform: translateX(120%); transition: 0.5s; font-weight: 700; }
        .toast.show { transform: translateX(0); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.3s ease-in-out; }
        .credit { position: absolute; bottom: 15px; right: 20px; color: rgba(255, 255, 255, 0.2); font-size: 10px; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="meteors">
        <div class="meteor" style="left: 80%"></div><div class="meteor" style="left: 65%; animation-delay: 2.5s;"></div>
    </div>

    <div class="container" id="main-container">
        <div class="logo-box"><img src="logo.png" alt="Logo"></div>

        <div class="loading-area" id="loading-area">
            <div class="bar-bg"><div id="bar-fill"></div></div>
            <p style="color: #94a3b8; font-size: 11px; margin-top: 10px;">KHỞI TẠO VŨ TRỤ... <span id="percent">0%</span></p>
        </div>

        <button id="start-btn">NHẤP ĐỂ BẮT ĐẦU</button>

        <div id="register-form" class="auth-form">
            <h3 style="text-align:center; margin-bottom:15px; letter-spacing:2px;">TẠO KÝ ỨC MỚI</h3>
            <div class="input-group"><label>Tên tài khoản</label><input type="text" id="reg-user" placeholder="..."></div>
            <div class="input-group">
                <label>Mật khẩu (8-12 kí tự, 1 In hoa)</label>
                <input type="password" id="reg-pass" placeholder="...">
                <span class="eye-icon" onclick="togglePass('reg-pass')">👁</span>
            </div>
            <div class="input-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="reg-repass" placeholder="...">
            </div>
            <button class="confirm-btn" onclick="handleRegister()">Xác nhận Đăng ký</button>
            <div class="switch-text">Đã có tài khoản? <b onclick="showForm('login')">Đăng nhập ngay</b></div>
        </div>

        <div id="login-form" class="auth-form">
            <h3 style="text-align:center; margin-bottom:15px; letter-spacing:2px;">ĐĂNG NHẬP</h3>
            <div class="input-group"><label>Tên tài khoản</label><input type="text" id="login-user"></div>
            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" id="login-pass">
                <span class="eye-icon" onclick="togglePass('login-pass')">👁</span>
            </div>
            <button class="confirm-btn" onclick="showToast('Đang kết nối server...')">Vào Game</button>
            <div class="switch-text">Chưa có tài khoản? <b onclick="showForm('register')">Đăng ký mới</b></div>
        </div>
    </div>

    <div class="credit">MADE BY KBG</div>

    <script>
        const container = document.getElementById('main-container');
        const startBtn = document.getElementById('start-btn');
        const loadingArea = document.getElementById('loading-area');
        const regForm = document.getElementById('register-form');
        const loginForm = document.getElementById('login-form');

        // 1. LOADING
        let p = 0;
        const loadIv = setInterval(() => {
            p += Math.floor(Math.random() * 8) + 2;
            if (p >= 100) { p = 100; clearInterval(loadIv); loadingArea.style.display = 'none'; startBtn.style.display = 'block'; }
            document.getElementById('bar-fill').style.width = p + '%';
            document.getElementById('percent').innerText = p + '%';
        }, 120);

        // 2. CHUYỂN CẢNH
        startBtn.onclick = () => {
            startBtn.style.display = 'none';
            container.style.width = '420px'; container.style.height = 'auto';
            setTimeout(() => { regForm.style.display = 'flex'; setTimeout(() => regForm.style.opacity = '1', 50); }, 400);
        };

        function showForm(type) {
            regForm.style.display = 'none'; loginForm.style.display = 'none';
            const target = type === 'login' ? loginForm : regForm;
            target.style.display = 'flex'; setTimeout(() => target.style.opacity = '1', 50);
        }

        // 3. TOAST SYSTEM
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast'; t.innerText = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.classList.add('show'), 100);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 500); }, 3000);
        }

        // 4. VALIDATE & GLOW
        const pass = document.getElementById('reg-pass');
        pass.addEventListener('input', () => {
            const v = pass.value; pass.classList.remove('weak', 'medium', 'strong');
            if(v.length >= 8 && /[A-Z]/.test(v) && /[!@#$%^&*]/.test(v)) pass.classList.add('strong');
            else if(v.length >= 6) pass.classList.add('medium');
            else if(v.length > 0) pass.classList.add('weak');
        });

        function togglePass(id) {
            const el = document.getElementById(id); el.type = el.type === 'password' ? 'text' : 'password';
        }

        function handleRegister() {
            const p1 = pass.value; const p2 = document.getElementById('reg-repass').value;
            if (p1 !== p2 || p1 === "" || p1.length < 8) {
                container.classList.add('shake'); setTimeout(() => container.classList.remove('shake'), 300);
                showToast("Dữ liệu không hợp lệ!");
            } else {
                showToast("Đăng ký thành công!");
                setTimeout(() => showForm('login'), 1000);
            }
        }
    </script>
</body>
</html>
