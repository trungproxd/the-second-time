<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Second Time - Universe System</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* --- NỀN VÀ GIAO DIỆN TỔNG THỂ --- */
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            margin: 0; padding: 0; background: #05070a url('./cover.jpg') no-repeat center fixed; 
            background-size: cover; display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: 'Be Vietnam Pro', sans-serif; color: white; 
        }

        /* --- HIỆU ỨNG SAO BĂNG --- */
        .meteors { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .meteor { position: absolute; top: -10px; width: 2px; height: 80px; background: linear-gradient(to bottom, rgba(255,255,255,0), #38bdf8); transform: rotate(-45deg); animation: shoot 5s linear infinite; opacity: 0; }
        @keyframes shoot { 0% { top: -10%; transform: translateX(0) rotate(-45deg); opacity: 1; } 100% { top: 110%; transform: translateX(-600px) rotate(-45deg); opacity: 0; } }

        /* --- CONTAINER ĐĂNG NHẬP CHUẨN UI --- */
        .container { 
            position: relative; width: 850px; height: 550px; 
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); 
            border: 2px solid rgba(56, 189, 248, 0.4); border-radius: 24px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 40px; box-shadow: 0 0 80px rgba(0,0,0,0.9); z-index: 10; 
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        /* --- PLAYER NHẠC GÓC TRÁI --- */
        .music-ui {
            position: fixed; bottom: 30px; left: 30px; z-index: 100;
            display: none; flex-direction: column; gap: 8px;
            background: rgba(15, 23, 42, 0.9); padding: 15px 20px;
            border-radius: 12px; border-left: 4px solid #38bdf8;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #music-status { font-size: 10px; color: #38bdf8; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; animation: blink 2s infinite; }
        #vol-control input { cursor: pointer; accent-color: #38bdf8; width: 80px; height: 3px; }
        @keyframes blink { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* --- FORM STYLING --- */
        .auth-form { display: none; width: 100%; max-width: 380px; flex-direction: column; opacity: 0; transition: 0.5s; }
        .input-group { margin-bottom: 20px; text-align: left; position: relative; }
        .input-group label { display: flex; justify-content: space-between; color: #94a3b8; font-size: 11px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group input { width: 100%; padding: 13px 15px; background: rgba(0, 0, 0, 0.7); border: 1px solid #334155; border-radius: 10px; color: #fff; outline: none; transition: 0.3s; }
        
        /* BORDER MẬT KHẨU */
        input.weak { border-color: #ef4444 !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); }
        input.medium { border-color: #f59e0b !important; box-shadow: 0 0 10px rgba(245, 158, 11, 0.2); }
        input.strong { border-color: #10b981 !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }

        .confirm-btn { 
            width: 100%; padding: 16px; background: linear-gradient(135deg, #0f172a, #000); 
            color: #fff; border: 1px solid #38bdf8; border-radius: 12px; font-weight: 700; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.4s;
        }
        .confirm-btn:hover { border-color: #fff; box-shadow: 0 0 30px rgba(56, 189, 248, 0.5); transform: translateY(-2px); }

        /* --- VIDEO INTRO OVERLAY --- */
        #video-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 10000; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 1s;
        }
        #intro-vid { width: 100%; height: 100%; object-fit: cover; }
        .skip-hint { position: absolute; bottom: 30px; right: 30px; color: rgba(255,255,255,0.6); border: 1px solid rgba(56,189,248,0.5); padding: 10px 25px; border-radius: 5px; cursor: pointer; z-index: 10001; font-size: 12px; transition: 0.3s; }
        .skip-hint:hover { background: rgba(56,189,248,0.2); color: #fff; }

        /* --- GIAO DIỆN GAME CHÍNH --- */
        #game-ui {
            display: none; width: 90%; max-width: 1100px; height: 80vh;
            background: rgba(10, 15, 25, 0.85); backdrop-filter: blur(25px);
            border: 1px solid #38bdf8; border-radius: 24px; padding: 40px;
            position: relative; flex-direction: column; opacity: 0; transition: 1.5s; z-index: 50;
        }
        .ui-header { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(56, 189, 248, 0.3); padding-bottom: 20px; }
        #u-name { margin: 0; color: #38bdf8; letter-spacing: 5px; text-shadow: 0 0 15px #38bdf8; }

        /* --- TOAST & NOTI --- */
        #toast-box { position: fixed; top: 25px; right: 25px; z-index: 10002; }
        .toast { background: rgba(15, 23, 42, 0.9); color: white; padding: 15px 25px; border-left: 5px solid #38bdf8; border-radius: 8px; margin-bottom: 10px; transform: translateX(120%); transition: 0.4s; }
        .toast.show { transform: translateX(0); }
        .shake { animation: shake-ani 0.4s; }
        @keyframes shake-ani { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div id="toast-box"></div>
    
    <div class="meteors">
        <div class="meteor" style="left: 20%; animation-delay: 1s;"></div>
        <div class="meteor" style="left: 50%; animation-delay: 3s;"></div>
        <div class="meteor" style="left: 80%; animation-delay: 0s;"></div>
    </div>

    <div class="music-ui" id="music-ui">
        <div id="music-status">BGM: Senbonzakura</div>
        <div id="vol-control"><input type="range" id="vol-bar" min="0" max="1" step="0.05" value="0.5"></div>
    </div>

    <div class="container" id="main-container">
        <div id="logo-part"><img src="./logo.png" style="max-width: 250px; margin-bottom: 30px;"></div>
        
        <div id="loading-part" style="width: 60%; text-align: center;">
            <div style="width: 100%; height: 6px; background: rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; border: 1px solid #334155;">
                <div id="bar-fill" style="width: 0%; height: 100%; background: #38bdf8; box-shadow: 0 0 15px #38bdf8; transition: 0.1s;"></div>
            </div>
            <p style="color: #38bdf8; font-size: 10px; margin-top: 15px; letter-spacing: 3px;">INITIALIZING... <span id="percent">0%</span></p>
        </div>

        <button id="btn-start" style="display: none; background: transparent; color: #fff; border: 2px solid #38bdf8; padding: 15px 60px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 50px; letter-spacing: 4px; transition: 0.3s;">START SYSTEM</button>

        <div id="reg-form" class="auth-form">
            <h3 style="text-align:center; letter-spacing:5px;">REGISTER</h3>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="r-user" placeholder="Nhập tên...">
            </div>
            <div class="input-group">
                <label>Password <span onclick="autoGen()" style="color:#38bdf8; cursor:pointer; font-size:9px;">[TẠO TỰ ĐỘNG]</span></label>
                <input type="password" id="r-pass" placeholder="Mật khẩu...">
            </div>
            <div class="input-group">
                <label>Confirm</label>
                <input type="password" id="r-repass" placeholder="Nhập lại...">
            </div>
            <button class="confirm-btn" onclick="handleReg()">XÁC NHẬN</button>
            <p style="text-align:center; font-size:11px; margin-top:15px;">Đã có dữ liệu? <b style="color:#38bdf8; cursor:pointer;" onclick="switchForm('login')">Đăng nhập</b></p>
        </div>

        <div id="log-form" class="auth-form">
            <h3 style="text-align:center; letter-spacing:5px;">LOGIN</h3>
            <div class="input-group"><label>User</label><input type="text" id="l-user"></div>
            <div class="input-group"><label>Pass</label><input type="password" id="l-pass"></div>
            <button class="confirm-btn" onclick="handleLog()">VÀO UNIVERSE</button>
            <p style="text-align:center; font-size:11px; margin-top:15px;">Người mới? <b style="color:#38bdf8; cursor:pointer;" onclick="switchForm('reg')">Đăng ký</b></p>
        </div>
    </div>

    <div id="video-overlay">
        <video id="intro-vid" muted playsinline>
            <source src="./intro.mp4" type="video/mp4">
        </video>
        <div class="skip-hint" onclick="stopIntro()">BỎ QUA INTRO [ESC]</div>
    </div>

    <div id="game-ui">
        <div class="ui-header">
            <div>
                <h2 id="u-name">CHARACTER</h2>
                <span id="u-uid" style="font-size: 11px; color: #64748b;">UID: 0000-0000-0000-0000-0000</span>
            </div>
            <div style="color: #10b981; font-size: 12px; font-weight: bold;">● STATUS: ONLINE</div>
        </div>
        <div style="margin-top: 50px; text-align: center; color: #94a3b8;">
            <p>Đang đồng bộ hóa không gian đa chiều...</p>
        </div>
    </div>

    <audio id="bgm" loop src="./bgm.mp3"></audio>

    <script>
        let db = JSON.parse(localStorage.getItem('TS_UNIVERSE')) || [];
        let curU = null;
        const mainBox = document.getElementById('main-container');

        // --- 1. LOADING ---
        let p = 0;
        const inv = setInterval(() => {
            p += Math.floor(Math.random() * 5) + 2;
            if(p >= 100) { p = 100; clearInterval(inv); document.getElementById('loading-part').style.display = 'none'; document.getElementById('btn-start').style.display = 'block'; }
            document.getElementById('bar-fill').style.width = p + '%';
            document.getElementById('percent').innerText = p + '%';
        }, 60);

        // --- 2. START ---
        document.getElementById('btn-start').onclick = () => {
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('music-ui').style.display = 'flex';
            const audio = document.getElementById('bgm'); audio.volume = 0.5; audio.play().catch(()=>{});
            mainBox.style.width = '420px';
            switchForm('reg');
        };

        // --- 3. PASSWORD STRENGTH ---
        document.getElementById('r-pass').oninput = function(e) {
            const v = e.target.value; this.className = '';
            if(v.length >= 8 && /[A-Z]/.test(v)) this.classList.add('strong');
            else if(v.length >= 6) this.classList.add('medium');
            else if(v.length > 0) this.classList.add('weak');
        };

        // --- 4. FORM LOGIC ---
        function switchForm(t) {
            document.getElementById('reg-form').style.display = 'none';
            document.getElementById('log-form').style.display = 'none';
            const target = document.getElementById(t + '-form');
            target.style.display = 'flex';
            setTimeout(() => target.style.opacity = '1', 50);
        }

        function handleReg() {
            const u = document.getElementById('r-user').value.trim();
            const p1 = document.getElementById('r-pass').value;
            const p2 = document.getElementById('r-repass').value;
            if(!u || !p1) return toast("⚠️ Thiếu thông tin!");
            if(p1 !== p2) return toast("❌ Pass không khớp!");
            if(db.some(x => x.u === u)) return (toast("❌ Đã có tên này!"), mainBox.classList.add('shake'), setTimeout(()=>mainBox.classList.remove('shake'), 400));
            
            const uid = Array.from({length: 20}, () => 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'[Math.floor(Math.random()*36)]).join('');
            db.push({u, p: p1, id: uid});
            localStorage.setItem('TS_UNIVERSE', JSON.stringify(db));
            toast("✅ Đăng ký xong!");
            switchForm('login');
        }

        function handleLog() {
            const u = document.getElementById('l-user').value.trim();
            const p = document.getElementById('l-pass').value;
            const user = db.find(x => x.u === u && x.p === p);
            if(user) {
                curU = user; toast("🚀 Đang vào Universe...");
                mainBox.style.opacity = '0';
                setTimeout(playIntro, 800);
            } else {
                toast("❌ Sai thông tin!"); mainBox.classList.add('shake'); setTimeout(()=>mainBox.classList.remove('shake'), 400);
            }
        }

        // --- 5. VIDEO INTRO ---
        function playIntro() {
            document.getElementById('bgm').pause();
            const ovl = document.getElementById('video-overlay');
            const vid = document.getElementById('intro-vid');
            ovl.style.display = 'flex';
            setTimeout(() => ovl.style.opacity = '1', 50);
            
            vid.play().then(() => { vid.muted = false; }).catch(() => {
                toast("Nhấn vào màn hình để xem Intro");
                ovl.onclick = () => { vid.play(); vid.muted = false; };
            });

            // Nếu 5s video không chạy (lỗi file) thì tự bỏ qua
            const fs = setTimeout(() => { if(vid.paused) stopIntro(); }, 5000);
            vid.onended = () => { clearTimeout(fs); stopIntro(); };
            window.onkeydown = (e) => { if(e.key === 'Escape') stopIntro(); };
        }

        function stopIntro() {
            const ovl = document.getElementById('video-overlay');
            ovl.style.opacity = '0';
            setTimeout(() => { ovl.remove(); document.getElementById('bgm').play(); showGame(); }, 1000);
        }

        function showGame() {
            mainBox.style.display = 'none';
            const gui = document.getElementById('game-ui');
            gui.style.display = 'flex';
            document.getElementById('u-name').innerText = curU.u.toUpperCase();
            document.getElementById('u-uid').innerText = "UID: " + curU.id.match(/.{1,4}/g).join('-');
            setTimeout(() => gui.style.opacity = '1', 100);
        }

        function toast(m) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = m;
            document.getElementById('toast-box').appendChild(t);
            setTimeout(() => t.classList.add('show'), 50);
            setTimeout(() => { t.classList.remove('show'); setTimeout(()=>t.remove(), 500); }, 3000);
        }

        function autoGen() {
            const p = "S" + Math.random().toString(36).slice(-8).toUpperCase() + "!";
            document.getElementById('r-pass').value = p; document.getElementById('r-repass').value = p;
            document.getElementById('r-pass').dispatchEvent(new Event('input'));
        }
        document.getElementById('vol-bar').oninput = (e) => { document.getElementById('bgm').volume = e.target.value; };
    </script>
</body>
</html>
