<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Second Time - Universe System</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { margin: 0; padding: 0; background: #0b0e14 url('./cover.jpg') no-repeat center fixed; background-size: cover; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Be Vietnam Pro', sans-serif; color: white; }
        
        /* SAO BĂNG */
        .meteors { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .meteor { position: absolute; top: -10px; width: 2px; height: 50px; background: linear-gradient(to bottom, rgba(255,255,255,0), #fff); transform: rotate(-45deg); animation: shoot 5s linear infinite; }
        @keyframes shoot { 0% { top: -10%; transform: translateX(0) rotate(-45deg); opacity: 1; } 100% { top: 110%; transform: translateX(-600px) rotate(-45deg); opacity: 0; } }

        /* KHUNG CHÍNH */
        .container { 
            position: relative; width: 850px; height: 550px; 
            background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(15px); 
            border: 2px solid rgba(56, 189, 248, 0.5); border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 40px; box-shadow: 0 0 50px rgba(0,0,0,0.9); z-index: 10; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .logo-box img { max-width: 280px; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.6)); }

        /* NOW PLAYING - GÓC DƯỚI TRÁI */
        .music-player-fixed {
            position: fixed; bottom: 25px; left: 25px; z-index: 100;
            display: none; flex-direction: column; gap: 8px;
            background: rgba(15, 23, 42, 0.85); padding: 15px 20px;
            border-radius: 12px; border-left: 4px solid #38bdf8;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        #music-info { font-size: 11px; color: #38bdf8; letter-spacing: 1.5px; text-transform: uppercase; font-weight: bold; animation: pulse 2s infinite; }
        #volume-box { display: flex; align-items: center; gap: 10px; }
        #volume-box input { cursor: pointer; accent-color: #38bdf8; width: 100px; height: 4px; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* LOADING */
        .loading-area { width: 60%; text-align: center; }
        .bar-bg { width: 100%; height: 10px; background: rgba(0,0,0,0.5); border-radius: 20px; border: 1px solid #475569; overflow: hidden; }
        #bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #38bdf8, #818cf8); box-shadow: 0 0 15px #38bdf8; }
        
        /* NÚT START */
        #start-btn { 
            display: none; background: #000; color: #fff; border: 2px solid #38bdf8; 
            padding: 18px 70px; font-size: 20px; font-weight: 700; cursor: pointer; 
            letter-spacing: 3px; border-radius: 50px; box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); 
            transition: 0.3s;
        }
        #start-btn:hover { background: #38bdf8; color: #000; box-shadow: 0 0 40px #38bdf8; transform: scale(1.05); }

        /* GIAO DIỆN FORM ĐẦY ĐỦ */
        .auth-form { display: none; width: 100%; max-width: 380px; flex-direction: column; opacity: 0; }
        .input-group { margin-bottom: 15px; text-align: left; position: relative; }
        .input-group label { display: flex; justify-content: space-between; color: #94a3b8; font-size: 11px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group input { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.7); border: 1px solid #334155; border-radius: 8px; color: #fff; outline: none; transition: 0.3s; padding-right: 45px; }
        
        /* Hiệu ứng Glow cho Input */
        input.weak { border-color: #ef4444 !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
        input.medium { border-color: #f59e0b !important; box-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }
        input.strong { border-color: #10b981 !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }

        .eye-icon { position: absolute; right: 15px; top: 32px; cursor: pointer; color: #64748b; font-size: 18px; z-index: 5; }
        .gen-btn { color: #38bdf8; cursor: pointer; font-weight: bold; font-size: 10px; border: 1px solid #38bdf8; padding: 2px 5px; border-radius: 4px; }

        .confirm-btn { 
            width: 100%; padding: 15px; background: linear-gradient(135deg, #0f172a, #000); 
            color: #fff; border: 1px solid #38bdf8; border-radius: 10px; font-weight: 700; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s; margin-top: 10px;
        }
        .confirm-btn:hover { border-color: #fff; box-shadow: 0 0 25px rgba(56, 189, 248, 0.5); }

        /* TOAST & SWITCH */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .toast { background: rgba(15, 23, 42, 0.95); color: #fff; padding: 15px 25px; border-radius: 10px; border-left: 4px solid #38bdf8; margin-bottom: 10px; transform: translateX(130%); transition: 0.5s; font-size: 12px; }
        .toast.show { transform: translateX(0); }
        .switch-text { margin-top: 20px; text-align: center; color: #94a3b8; font-size: 12px; }
        .switch-text b { color: #38bdf8; cursor: pointer; }
        .credit { position: absolute; bottom: 15px; right: 20px; color: rgba(255, 255, 255, 0.1); font-size: 10px; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>

    <div id="toast-container"></div>
    <div class="meteors"><div class="meteor" style="left: 70%"></div><div class="meteor" style="left: 20%; animation-delay: 2.5s;"></div></div>

    <div class="music-player-fixed" id="player-ui">
        <div id="music-info">🎵 Now Playing: Senbonzakura</div>
        <div id="volume-box">
            <span style="font-size: 8px; color: #94a3b8; font-weight: bold;">VOL</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5">
        </div>
    </div>

    <div class="container" id="main-container">
        <div class="logo-box"><img src="./logo.png" alt="Logo"></div>

        <div class="loading-area" id="loading-area">
            <div class="bar-bg"><div id="bar-fill"></div></div>
            <p style="color: #38bdf8; font-size: 11px; margin-top: 12px;">SYSTEM INITIALIZING... <span id="percent">0%</span></p>
        </div>

        <button id="start-btn">NHẤP ĐỂ BẮT ĐẦU</button>

        <div id="register-form" class="auth-form">
            <h3 style="text-align:center; margin-bottom:20px; letter-spacing:3px;">ĐĂNG KÝ TÀI KHOẢN</h3>
            <div class="input-group">
                <label>Tên nhân vật</label>
                <input type="text" id="reg-user" placeholder="Tên truy cập...">
            </div>
            <div class="input-group">
                <label>Mật khẩu <span class="gen-btn" onclick="autoGenPass()">TẠO TỰ ĐỘNG</span></label>
                <input type="password" id="reg-pass" placeholder="Mật khẩu của bạn...">
                <span class="eye-icon" onclick="togglePass('reg-pass')">👁</span>
            </div>
            <div class="input-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="reg-repass" placeholder="Nhập lại mật khẩu...">
                <span class="eye-icon" onclick="togglePass('reg-repass')">👁</span>
            </div>
            <button class="confirm-btn" onclick="handleRegister()">Khởi Tạo Ký Ức</button>
            <div class="switch-text">Đã có tài khoản? <b onclick="showForm('login')">Đăng nhập ngay</b></div>
        </div>

        <div id="login-form" class="auth-form">
            <h3 style="text-align:center; margin-bottom:20px; letter-spacing:3px;">ĐĂNG NHẬP</h3>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="login-user" placeholder="Nhập tên...">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-pass" placeholder="Nhập mật khẩu...">
                <span class="eye-icon" onclick="togglePass('login-pass')">👁</span>
            </div>
            <button class="confirm-btn" onclick="showToast('Hệ thống đang đồng bộ...')">Vào Game</button>
            <div class="switch-text">Người mới? <b onclick="showForm('register')">Đăng ký tại đây</b></div>
        </div>
    </div>

    <div class="credit">THE SECOND TIME | BY KBG</div>
    <audio id="bgm" loop src="./bgm.mp3"></audio>

    <script>
        const container = document.getElementById('main-container');
        const startBtn = document.getElementById('start-btn');
        const loadingArea = document.getElementById('loading-area');
        const playerUI = document.getElementById('player-ui');
        const regForm = document.getElementById('register-form');
        const loginForm = document.getElementById('login-form');
        const bgm = document.getElementById('bgm');
        const volSlider = document.getElementById('volume-slider');
        const passInput = document.getElementById('reg-pass');

        // Loading
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 5) + 2;
            if (progress >= 100) {
                progress = 100; clearInterval(interval);
                loadingArea.style.display = 'none'; startBtn.style.display = 'block';
            }
            document.getElementById('bar-fill').style.width = progress + '%';
            document.getElementById('percent').innerText = progress + '%';
        }, 100);

        // Start
        startBtn.onclick = () => {
            startBtn.style.display = 'none';
            playerUI.style.display = 'flex';
            bgm.volume = 0.5;
            bgm.play();
            container.style.width = '420px';
            container.style.height = 'auto';
            setTimeout(() => {
                regForm.style.display = 'flex';
                setTimeout(() => regForm.style.opacity = '1', 50);
            }, 400);
        };

        volSlider.oninput = (e) => { bgm.volume = e.target.value; };

        // Database & Logic
        let users = JSON.parse(localStorage.getItem('user_db_tst')) || [];

        function showForm(type) {
            regForm.style.display = 'none'; loginForm.style.display = 'none';
            const target = (type === 'login') ? loginForm : regForm;
            target.style.display = 'flex'; setTimeout(() => target.style.opacity = '1', 50);
        }

        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = (input.type === 'password') ? 'text' : 'password';
        }

        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.classList.add('show'), 100);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 500); }, 4000);
        }

        // Mật khẩu tự động & Kiểm tra độ mạnh
        function autoGenPass() {
            const res = "S" + Math.random().toString(36).slice(-8).toUpperCase() + "!";
            passInput.value = res;
            document.getElementById('reg-repass').value = res;
            passInput.classList.add('strong');
            showToast("Đã tạo mật khẩu mạnh!");
        }

        passInput.addEventListener('input', () => {
            const v = passInput.value;
            passInput.classList.remove('weak', 'medium', 'strong');
            if(v.length >= 8 && /[A-Z]/.test(v)) passInput.classList.add('strong');
            else if(v.length >= 6) passInput.classList.add('medium');
            else if(v.length > 0) passInput.classList.add('weak');
        });

        function handleRegister() {
            const user = document.getElementById('reg-user').value.trim();
            const p1 = passInput.value;
            const p2 = document.getElementById('reg-repass').value;

            if(!user || !p1) { showToast("⚠️ Vui lòng nhập đủ thông tin!"); return; }
            if(users.some(u => u.username === user)) {
                showToast("❌ Tên tài khoản đã tồn tại!");
                container.classList.add('shake'); setTimeout(() => container.classList.remove('shake'), 400);
                return;
            }
            if(p1 !== p2) { showToast("❌ Mật khẩu không khớp!"); return; }

            const uid = Array.from({length: 20}, () => 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'[Math.floor(Math.random()*36)]).join('');
            users.push({ uid, username: user, password: p1 });
            localStorage.setItem('user_db_tst', JSON.stringify(users));
            showToast("✅ Đăng ký thành công! UID: " + uid);
            setTimeout(() => showForm('login'), 2500);
        }
    </script>
</body>
</html>
