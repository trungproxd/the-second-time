<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Second Time - Universe System</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; outline: none; -webkit-font-smoothing: antialiased; }
        body { 
            margin: 0; padding: 0; background: #0b0e14 url('./cover.jpg') no-repeat center fixed; 
            background-size: cover; display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: 'Be Vietnam Pro', sans-serif; color: white; 
        }

        /* --- HIỆU ỨNG NỀN --- */
        .meteors { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .meteor { 
            position: absolute; width: 2px; height: 60px; 
            background: linear-gradient(to bottom, transparent, #fff); 
            transform: rotate(-45deg); opacity: 0; animation: shoot 5s linear infinite; 
        }
        @keyframes shoot {
            0% { transform: translate(0, 0) rotate(-45deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translate(-600px, 600px) rotate(-45deg); opacity: 0; }
        }

        .made-by {
            position: fixed; bottom: 20px; right: 30px; font-size: 10px;
            letter-spacing: 4px; color: rgba(56, 189, 248, 0.6);
            text-transform: uppercase; z-index: 1000;
        }

        /* --- MUSIC PLAYER --- */
        .music-player {
            position: fixed; bottom: 30px; left: 30px; z-index: 1000;
            display: none; flex-direction: column; gap: 8px;
            background: rgba(15, 23, 42, 0.9); padding: 15px 20px;
            border-radius: 16px; border-left: 5px solid #38bdf8;
            backdrop-filter: blur(10px); box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }
        #vol-slider { cursor: pointer; accent-color: #38bdf8; width: 100px; height: 4px; }

        /* --- MAIN UI --- */
        .main-box { 
            position: relative; width: 440px; min-height: 600px; 
            background: rgba(10, 15, 25, 0.85); backdrop-filter: blur(25px); 
            border: 1px solid rgba(56, 189, 248, 0.3); border-radius: 32px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; box-shadow: 0 0 100px rgba(0,0,0,1); z-index: 10; transition: 0.8s;
        }
        .bar-bg { width: 100%; height: 16px; background: rgba(0,0,0,0.5); border-radius: 20px; border: 1px solid #1e293b; overflow: hidden; margin-bottom: 20px; }
        #bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #0ea5e9, #38bdf8); box-shadow: 0 0 15px #38bdf8; transition: 0.1s; }

        /* --- FORMS --- */
        .auth-form { display: none; width: 100%; flex-direction: column; opacity: 0; transition: 0.5s; }
        .active { display: flex !important; opacity: 1; }
        .field { margin-bottom: 15px; width: 100%; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .label-row label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
        
        .input-box { position: relative; }
        .input-box input { width: 100%; padding: 14px; border-radius: 12px; background: rgba(0,0,0,0.6); border: 1px solid #334155; color: white; transition: 0.3s; }
        .eye-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.5; font-size: 18px; }

        .btn-main { 
            position: relative; width: 100%; padding: 18px; 
            background: #000; color: #fff; border: 1px solid #38bdf8; 
            border-radius: 14px; font-weight: 700; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 3px; transition: 0.4s; margin-top: 10px;
        }
        .btn-main:hover { box-shadow: 0 0 30px rgba(56, 189, 248, 0.6); border-color: #fff; transform: translateY(-2px); }

        /* --- CHARACTER CREATOR (NEW) --- */
        #char-creator {
            display: none; width: 900px; background: rgba(10, 20, 30, 0.95);
            border: 2px solid #38bdf8; border-radius: 24px; padding: 40px;
            z-index: 1000; flex-direction: row; gap: 40px; opacity: 0; transition: 1s;
        }
        .preview-side {
            width: 380px; height: 500px; position: relative;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.1), transparent);
            border-radius: 20px; border: 1px solid rgba(56, 189, 248, 0.2);
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .char-layer {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.5s ease-in-out; pointer-events: none;
        }
        .char-layer.active { opacity: 1; }
        .char-layer img { height: 90%; object-fit: contain; filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.4)); }

        .custom-side { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .opt-label { font-size: 10px; color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; font-weight: bold; }
        
        .opt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-opt { padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #334155; color: #fff; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 11px; }
        .btn-opt.selected { border-color: #38bdf8; background: rgba(56, 189, 248, 0.2); box-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }
        
        .palette-grid { display: flex; gap: 15px; }
        .color-circle { 
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; 
            border: 2px solid #1e293b; transition: 0.3s; position: relative;
        }
        .color-circle.selected { border-color: #fff; transform: scale(1.15); box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        /* --- UTILS --- */
        #intro-box { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; opacity: 0; transition: 1s; }
        #intro-vid { width: 100%; height: 100%; object-fit: cover; }
        #toast-box { position: fixed; top: 20px; right: 20px; z-index: 10001; }
        .toast { background: rgba(15, 23, 42, 0.95); color: #fff; padding: 15px 25px; border-radius: 12px; border-left: 5px solid #38bdf8; margin-bottom: 10px; transform: translateX(150%); transition: 0.5s; font-size: 13px; }
        .toast.show { transform: translateX(0); }

        #game-ui {
            display: none; width: 95%; max-width: 1100px; height: 85vh;
            background: rgba(15, 23, 42, 0.95); border: 2px solid #38bdf8; 
            border-radius: 24px; padding: 30px; flex-direction: column; opacity: 0; transition: 1s; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="toast-box"></div>
    <div class="meteors" id="meteor-container"></div>
    <div class="made-by">MADE BY KAIBU GANG</div>

    <div class="music-player" id="player">
        <div style="font-size:10px; color:#38bdf8; margin-bottom:5px;">🎵 BGM: SENBONZAKURA</div>
        <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="0.5">
    </div>

    <div class="main-box" id="container">
        <img src="./logo.png" style="max-width: 200px; margin-bottom: 25px;" alt="Logo">
        <div id="loading-ui">
            <div class="bar-bg"><div id="bar-fill"></div></div>
            <div style="color:#38bdf8; font-size:10px; letter-spacing:3px; text-align:center;">CONNECTING... <span id="percent">0%</span></div>
        </div>
        <button id="start-btn" class="btn-main" style="display: none; border-radius: 50px;">ACCESS SYSTEM</button>

        <div id="log-form" class="auth-form">
            <h2 style="text-align:center; margin-bottom:20px; letter-spacing:4px;">LOGIN</h2>
            <div class="field">
                <div class="label-row"><label>Username</label></div>
                <div class="input-box"><input type="text" id="l-user" placeholder="Username..."></div>
            </div>
            <div class="field">
                <div class="label-row"><label>Password</label></div>
                <div class="input-box">
                    <input type="password" id="l-pass" placeholder="Mật mã...">
                    <span class="eye-btn" onclick="togglePass('l-pass')">👁</span>
                </div>
            </div>
            <button class="btn-main" onclick="doLogin()">Vào Universe</button>
            <p style="text-align:center; font-size:12px; margin-top:15px;">Người mới? <b style="color:#38bdf8; cursor:pointer;" onclick="go('reg')">Đăng ký ngay</b></p>
        </div>

        <div id="reg-form" class="auth-form">
            <h2 style="text-align:center; margin-bottom:15px; letter-spacing:4px;">SIGN UP</h2>
            <div class="field">
                <div class="label-row"><label>Username</label></div>
                <div class="input-box"><input type="text" id="r-user" placeholder="Tên nhân vật..."></div>
            </div>
            <div class="field">
                <div class="label-row"><label>Password</label></div>
                <div class="input-box"><input type="password" id="r-pass" placeholder="Mật khẩu..."></div>
            </div>
            <div class="field">
                <div class="label-row"><label>Confirm Password</label></div>
                <div class="input-box"><input type="password" id="r-re" placeholder="Nhập lại mật khẩu..."></div>
            </div>
            <button class="btn-main" onclick="doRegister()">Khởi Tạo Ký Ức</button>
            <p style="text-align:center; font-size:12px; margin-top:15px;">Đã có tài khoản? <b style="color:#38bdf8; cursor:pointer;" onclick="go('log')">Đăng nhập</b></p>
        </div>
    </div>

    <div id="intro-box">
        <video id="intro-vid" playsinline><source src="./intro.mp4" type="video/mp4"></video>
        <div style="position:absolute; bottom:30px; right:30px; color:white; border:1px solid #fff; padding:10px; cursor:pointer; z-index:10000;" onclick="finishIntro()">BỎ QUA [ESC]</div>
    </div>

    <div id="char-creator">
        <div class="preview-side">
            <div class="char-layer" id="layer-warrior-blue"><img src="image_9.png"></div>
            <div class="char-layer" id="layer-warrior-white"><img src="image_11.png"></div>
            <div class="char-layer" id="layer-warrior-orange"><img src="image_10.png"></div>
            <div class="char-layer" id="layer-archer-blue"><img src="image_5.png"></div>
            <div class="char-layer" id="layer-archer-white"><img src="image_3.png"></div>
            <div class="char-layer" id="layer-archer-orange"><img src="image_4.png"></div>
            <div class="char-layer" id="layer-mage-blue"><img src="image_6.png"></div>
            <div class="char-layer" id="layer-mage-white"><img src="image_8.png"></div>
            <div class="char-layer" id="layer-mage-orange"><img src="image_7.png"></div>
            
            <div id="preview-role-text" style="position:absolute; bottom:30px; font-weight:bold; letter-spacing:5px; color:#38bdf8; font-size:24px;">KIẾM SĨ</div>
        </div>

        <div class="custom-side">
            <h2 style="margin:0; color:#38bdf8; letter-spacing:4px;">THIẾT LẬP THỰC THỂ</h2>
            
            <div>
                <div class="opt-label">Chọn chức nghiệp</div>
                <div class="opt-grid">
                    <button class="btn-opt selected" onclick="updateRole('warrior', 'KIẾM SĨ')">Kiếm sĩ</button>
                    <button class="btn-opt" onclick="updateRole('archer', 'CUNG THỦ')">Cung thủ</button>
                    <button class="btn-opt" onclick="updateRole('mage', 'PHÁP SƯ')">Pháp sư</button>
                </div>
            </div>

            <div>
                <div class="opt-label">Màu sắc linh hồn</div>
                <div class="palette-grid">
                    <div class="color-circle selected" style="background:#38bdf8;" onclick="updatePalette(this, 'blue')"></div>
                    <div class="color-circle" style="background:#ffffff;" onclick="updatePalette(this, 'white')"></div>
                    <div class="color-circle" style="background:#f97316;" onclick="updatePalette(this, 'orange')"></div>
                </div>
            </div>

            <button class="btn-main" onclick="confirmCharacter()" style="margin-top:auto;">KÍCH HOẠT NHÂN VẬT</button>
        </div>
    </div>

    <div id="game-ui">
        <h2 style="margin:0; color:#38bdf8; border-bottom:1px solid #38bdf8; padding-bottom:10px;">UNIVERSE OS</h2>
        <div style="flex:1; display:flex; justify-content:center; align-items:center; flex-direction:column;">
            <div id="game-char-display"></div>
            <h1 id="game-user-name" style="margin:10px 0 0 0; letter-spacing:5px;">PLAYER</h1>
            <p id="game-role-name" style="color:#38bdf8; text-transform:uppercase;">KIẾM SĨ</p>
        </div>
        <button class="btn-main" style="width:200px; align-self:center;" onclick="location.reload()">LOGOUT</button>
    </div>

    <audio id="bgm" loop src="./bgm.mp3"></audio>

    <script>
        let db = JSON.parse(localStorage.getItem('UNIVERSE_DB')) || [];
        const sfx = new Audio('./ting.mp3');
        const bgm = document.getElementById('bgm');
        let currentRole = 'warrior';
        let currentPalette = 'blue';

        function playSfx() { let s = sfx.cloneNode(); s.volume = 0.2; s.play().catch(()=>{}); }

        // Mưa sao băng
        for(let i=0; i<8; i++) {
            let m = document.createElement('div'); m.className = 'meteor';
            m.style.left = Math.random() * 100 + '%'; m.style.top = Math.random() * 50 + '%';
            m.style.animationDelay = Math.random() * 5 + 's';
            document.getElementById('meteor-container').appendChild(m);
        }

        // Loading Progress
        let p = 0;
        const load = setInterval(() => {
            p += Math.floor(Math.random() * 5) + 3;
            if(p >= 100) { p = 100; clearInterval(load);
                document.getElementById('loading-ui').style.display = 'none';
                document.getElementById('start-btn').style.display = 'block';
            }
            document.getElementById('bar-fill').style.width = p + '%';
            document.getElementById('percent').innerText = p + '%';
        }, 50);

        document.getElementById('start-btn').onclick = () => {
            playSfx(); bgm.play().catch(()=>{});
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('player').style.display = 'flex';
            go('log'); 
        };

        function go(type) {
            playSfx();
            document.querySelectorAll('.auth-form').forEach(f => { f.style.display='none'; f.classList.remove('active'); });
            const target = document.getElementById(type + '-form');
            if(target) {
                target.style.display = 'flex';
                setTimeout(() => target.classList.add('active'), 50);
            }
        }

        function togglePass(id) {
            playSfx();
            let x = document.getElementById(id);
            x.type = x.type === 'password' ? 'text' : 'password';
        }

        function doRegister() {
            playSfx();
            let u = document.getElementById('r-user').value.trim();
            let p1 = document.getElementById('r-pass').value;
            let p2 = document.getElementById('r-re').value;
            if(!u || !p1) return toast("⚠️ Thiếu thông tin!");
            if(p1 !== p2) return toast("❌ Mật khẩu không khớp!");
            db.push({u, p: p1});
            localStorage.setItem('UNIVERSE_DB', JSON.stringify(db));
            toast("✅ Đăng ký thành công!");
            go('log');
        }

        function doLogin() {
            playSfx();
            let u = document.getElementById('l-user').value.trim();
            let p = document.getElementById('l-pass').value;
            let user = db.find(x => x.u === u && x.p === p);
            if(user) {
                toast("🚀 Đồng bộ hệ thống...");
                document.getElementById('container').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('container').style.display = 'none';
                    startIntro();
                }, 800);
            } else { toast("❌ Sai thông tin!"); }
        }

        function startIntro() {
            bgm.pause();
            const box = document.getElementById('intro-box');
            const vid = document.getElementById('intro-vid');
            box.style.display = 'block';
            setTimeout(() => box.style.opacity = '1', 50);
            vid.play();
            vid.onended = finishIntro;
        }

        function finishIntro() {
            const vid = document.getElementById('intro-vid');
            vid.onended = null;
            vid.pause();
            document.getElementById('intro-box').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-box').style.display = 'none';
                if (window.getComputedStyle(document.getElementById('char-creator')).display === 'none') {
                    document.getElementById('char-creator').style.display = 'flex';
                    setTimeout(() => {
                        document.getElementById('char-creator').style.opacity = '1';
                        refreshAvatar();
                        bgm.play();
                    }, 50);
                }
            }, 1000);
        }

        // --- HỆ THỐNG AVATAR MỚI ---
        function updateRole(role, name) {
            playSfx();
            currentRole = role;
            document.getElementById('preview-role-text').innerText = name;
            
            const btns = document.querySelectorAll('.btn-opt');
            btns.forEach(b => b.classList.remove('selected'));
            event.target.classList.add('selected');
            
            refreshAvatar();
        }

        function updatePalette(el, color) {
            playSfx();
            currentPalette = color;
            
            const circles = document.querySelectorAll('.color-circle');
            circles.forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            
            refreshAvatar();
        }

        function refreshAvatar() {
            const layers = document.querySelectorAll('.char-layer');
            layers.forEach(l => l.classList.remove('active'));
            
            const targetId = `layer-${currentRole}-${currentPalette}`;
            const target = document.getElementById(targetId);
            if(target) target.classList.add('active');
        }

        function confirmCharacter() {
            playSfx();
            toast("🌀 KẾT NỐI THỰC THỂ...");
            document.getElementById('char-creator').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('char-creator').style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
                setTimeout(() => document.getElementById('game-ui').style.opacity = '1', 50);
                
                const activeImg = document.querySelector('.char-layer.active img').src;
                document.getElementById('game-char-display').innerHTML = `<img src="${activeImg}" style="height:250px; filter:drop-shadow(0 0 20px #38bdf8);">`;
                document.getElementById('game-user-name').innerText = (document.getElementById('l-user').value || "PLAYER").toUpperCase();
                document.getElementById('game-role-name').innerText = document.getElementById('preview-role-text').innerText;
            }, 1500);
        }

        function toast(m) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = m;
            document.getElementById('toast-box').appendChild(t);
            setTimeout(() => t.classList.add('show'), 50);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 500); }, 3000);
        }
        document.getElementById('vol-slider').oninput = (e) => bgm.volume = e.target.value;
    </script>
</body>
</html>
